name: Deploy Backend

on:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ditoow/be_fieldbooking:latest
            ghcr.io/ditoow/be_fieldbooking:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 203.175.125.36
          username: ubuntu
          password: ${{ secrets.VPS }}
          port: 28189
          script: |
            cd /opt/fieldbooking/be_fieldbooking

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ditoow --password-stdin

            docker compose pull app worker scheduler

            docker compose up -d --remove-orphans app worker scheduler

            docker image prune -f
